<div id="opening">
  <video autoplay muted playsinline>
    <source src="assets/opening.mp4">
  </video>
  <div class="overlay">
    <h1>Nama Kamu</h1>
    <p>Are Getting Married</p>
    <button onclick="start()">Open Invitation</button>
  </div>
</div>

<div id="envelope" onclick="openEnvelope()">
  <div class="top"></div>
  <div class="body">Klik untuk membuka</div>
</div>

<canvas id="flowers"></canvas>

<div id="app" class="hidden">

<section class="slide active">
  <h1>Nama Pengantin</h1>
</section>

<section class="slide">
  <h2>Save The Date</h2>
  <div id="countdown"></div>
</section>

<section class="slide">
  <h2>Love Story</h2>
  <div class="timeline">
    <div>Awal Bertemu</div>
    <div>Lamaran</div>
    <div>Menikah</div>
  </div>
</section>

<section class="slide">
  <div class="slider">
    <img src="assets/gallery1.jpg">
    <img src="assets/gallery2.jpg">
    <img src="assets/gallery3.jpg">
  </div>
</section>

<section class="slide">
  <iframe src="https://maps.google.com/maps?q=jakarta&output=embed"></iframe>
</section>

<section class="slide">
  <form id="form">
    <input name="nama" placeholder="Nama">
    <textarea name="ucapan"></textarea>
    <button>Kirim</button>
  </form>
</section>

</div>
