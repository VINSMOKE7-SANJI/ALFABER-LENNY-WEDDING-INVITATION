<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Pernikahan</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Great+Vibes&display=swap" rel="stylesheet">
</head>
<body>

<div id="opening">
  <video autoplay muted playsinline>
    <source src="assets/video.mp4" type="video/mp4">
  </video>
  <div class="opening-text">
    <h1>Nama Pria & Nama Wanita</h1>
    <button onclick="enterSite()">Masuk Undangan</button>
  </div>
</div>

<div id="main" class="hidden">

<audio id="music" loop>
  <source src="assets/music.mp3" type="audio/mpeg">
</audio>

<section class="parallax">
  <h1>Nama Pria & Nama Wanita</h1>
</section>

<section>
  <h2>Countdown</h2>
  <div id="timer"></div>
</section>

<section>
  <h2>Gallery</h2>
  <div class="slider">
    <img src="assets/gallery1.jpg">
    <img src="assets/gallery2.jpg">
    <img src="assets/gallery3.jpg">
  </div>
</section>

<section>
  <h2>RSVP</h2>
  <form id="rsvpForm">
    <input name="nama" placeholder="Nama">
    <select name="kehadiran">
      <option>Hadir</option>
      <option>Tidak Hadir</option>
    </select>
    <textarea name="ucapan"></textarea>
    <button>Kirim</button>
  </form>
</section>

</div>

<script src="js/script.js"></script>
</body>
</html>
